[project]
name = "bravura"
version = "0.1.0"
authors = ["Neclow <neilclow24@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
matplotlib = "*"
seaborn = "*"
ipykernel = ">=7.2.0,<8"
pandas = ">=3.0.2,<4"
openpyxl = ">=3.1.5,<4"
scipy = ">=1.17.1,<2"
scikit-learn = ">=1.8.0,<2"
kmedoids = ">=0.5.4,<0.6"
pingouin = ">=0.6.1,<0.7"
r-base = ">=4.5.3,<4.6"
r-extradistr = ">=1.10.0.2,<2"
r-tidybayes = ">=3.0.7,<4"
tqdm = ">=4.67.3,<5"
r-emmeans = ">=2.0.2,<3"
r-bayestestr = ">=0.17.0,<0.18"
r-logspline = ">=2.1.22,<3"
r-bayesfactor = ">=0.9.12_4.8,<0.10"
r-report = ">=0.6.3,<0.7"

[tasks]
post_install = "bash scripts/post_install.sh"
brms_shocks = { cmd = "Rscript src/brms/shocks.R", description = "Fit brms shock models (binomial, beta-binomial, K-fold CV)" }
brms_psap = { cmd = "Rscript src/brms/psap.R", description = "Fit brms PSAP models (Gaussian, Beta, zero-inflated Beta)" }
brms_delta_hr = { cmd = "Rscript src/brms/delta_hr.R", description = "Fit brms delta-HR models (Cluster x block, Gaussian/Student-t)" }
brms_delta_hr_rep = { cmd = "Rscript src/brms/delta_hr_replication.R", description = "Replication analysis: Cohort B with Cohort A-informed priors" }
brms_physio_mv = { cmd = "Rscript src/brms/physio_multivariate.R", description = "Multivariate physio model (HR, HRV, Resp, EDA × Cluster × block)" }
brms_physio_cardiac = { cmd = "Rscript src/brms/physio_cardiac.R", description = "Cardiac model (HR + HRV PC1/PC2 × Cluster × block)" }
brms_latency = { cmd = "Rscript src/brms/latency.R", description = "Shock latency model (lognormal, Cluster × opponent)" }
brms_baseline_hr = { cmd = "Rscript src/brms/baseline_hr.R", description = "Test baseline HR by cluster (expected: no difference)" }
brms_shocks_overview = { cmd = "Rscript src/brms/shocks_overview.R", description = "Opponent provocation effect (binomial, opponent × cohort)" }
brms_trial_duration = { cmd = "Rscript src/brms/trial_duration.R", description = "Trial duration by decision type (Student-t, decision × cohort)" }

[pypi-dependencies]
statannotations = ">=0.7.2, <0.8"

[environments]
dev = ["dev"]

[feature.dev.dependencies]
pandoc = ">=3"

[feature.dev.tasks]
docx = { cmd = "cd tex && pandoc draft_working.md --citeproc --bibliography=References.bib -o ../output/bravura_revised.docx", description = "Generate .docx from draft_working.md" }
pdf = { cmd = "cd tex && pandoc draft_working.md --citeproc --bibliography=References.bib --pdf-engine=xelatex -V geometry:margin=1in -o ../output/bravura_revised.pdf", description = "Generate .pdf from draft_working.md" }
tex = { cmd = "cd tex && pandoc draft_working.md --citeproc --bibliography=References.bib -o ../output/bravura_revised.tex", description = "Generate .tex from draft_working.md" }
